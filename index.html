<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Monte+Carlo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Angela Acácia | Moda Crochê</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4a373">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>
    <header class="header-main">
        <div class="header-container">
            <div class="logo">
                <img src="img/logo2.png" alt="Logo Angela Acácia Crochê">
            </div>

            <nav class="nome">
                <h5>Moda Feminina em Crochê</h5>
            </nav>
        </div>
    </header>

    <section class="hero-croche">
        <div class="hero-overlay"></div>
        <div class="hero-conteudo">
            <p class="hero-subtitulo">Arte feita à mão com carinho 🪡 </p>
            <h1 class="hero-titulo">Angela Acácia</h1>
            <p class="hero-frase">Moda feminina em crochê que abraça e encanta.</p>

            <button id="btnDescobrir" class="btn-hero">Conheça Nossas Coleções</button>
        </div>
    </section>

    <!--campo responsavel pelas imagens dos menus-->
    <section class="filter-bar">
        <div class="filter-item" style="background-image: url('img/blusinha.jpeg');"><span></span></div>
        <div class="filter-item active" style="background-image: url('img/blusinha4.jpeg');"><span></span></div>
        <div class="filter-item" style="background-image: url('img/blusinha3.jpg');"><span></span></div>
        <div class="filter-item" style="background-image: url('img/blusinha2.jpeg');"><span></span></div>
    </section>

    <div id="meuModal" class="modal">
        <span class="fechar">&times;</span>
        <div class="modal-conteudo">
            <h2>MINHAS PEÇAS</h2>
            <div class="galeria-grid">
                <div class="item-galeria">
                    <img src="img/chinelo-flor.jpg" alt="Chinelo de crochê com flor">
                    <p class="legenda-foto">Chinelos de flor</p>
                    <a href="https://wa.me/5516991788450" target="_blank" rel="noopener"
                        class="btn-whatsapp">Encomendar</a>
                </div>

                <div class="item-galeria">
                    <img src="Top-Brasil-Branco.jpeg" alt="Chinelo de crochê com flor">
                    <p class="legenda-foto">Topinho Branco bandeira do Brasil</p>
                    <a href="https://wa.me/5516991788450" target="_blank" rel="noopener"
                        class="btn-whatsapp">Encomendar</a>
                </div>
                <div class="item-galeria">
                    <img src="img/chinelo-flor.jpg" alt="Chinelo de crochê com flor">
                    <p class="legenda-foto">Chinelos de flor</p>
                    <a href="https://wa.me/5516991788450" target="_blank" rel="noopener"
                        class="btn-whatsapp">Encomendar</a>
                </div>

                <div class="item-galeria">
                    <img src="img/blusinha3.jpg" alt="Blusinha alcinha verde em crochê">
                    <p class="legenda-foto">Blusinha alcinha verde Tam.P</p>
                    <a href="https://wa.me/5516991788450" target="_blank" rel="noopener"
                        class="btn-whatsapp">Encomendar</a>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-container" class="modal">
        <span class="fechar-modal">&times;</span>
        <img class="modal-conteudo" id="imagem-ampliada" alt="Imagem ampliada">
        <div id="legenda-modal"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
